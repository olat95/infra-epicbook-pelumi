trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  TF_WORKING_DIR: '$(System.DefaultWorkingDirectory)'

stages:
- stage: Terraform
  displayName: 'Provision Infrastructure'
  jobs:
  - job: TerraformApply
    displayName: 'Terraform Init, Plan, Apply'
    steps:

    - task: DownloadSecureFile@1
      name: sshPublicKey
      displayName: 'Download SSH Public Key'
      inputs:
        secureFile: 'id_rsa_pub'

    - script: |
        mkdir -p ~/.ssh
        cp $(sshPublicKey.secureFilePath) ~/.ssh/id_rsa.pub
        chmod 644 ~/.ssh/id_rsa.pub
        echo "SSH public key staged"
      displayName: 'Stage SSH Public Key'

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(TF_WORKING_DIR)'
        backendServiceArm: 'azure-rm-connection'
        backendAzureRmResourceGroupName: 'epicbook-tfstate-rg'
        backendAzureRmStorageAccountName: 'epicbooktfstate'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'epicbook.terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(TF_WORKING_DIR)'
        environmentServiceNameAzureRM: 'azure-rm-connection'
        commandOptions: >
          -var="subscription_id=$(ARM_SUBSCRIPTION_ID)"
          -var="client_id=$(ARM_CLIENT_ID)"
          -var="client_secret=$(ARM_CLIENT_SECRET)"
          -var="tenant_id=$(ARM_TENANT_ID)"
          -var="ssh_public_key=$(cat ~/.ssh/id_rsa.pub)"

    - task: TerraformTaskV4@4
      displayName: 'Terraform Apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(TF_WORKING_DIR)'
        environmentServiceNameAzureRM: 'azure-rm-connection'
        commandOptions: >
          -auto-approve
          -var="subscription_id=$(ARM_SUBSCRIPTION_ID)"
          -var="client_id=$(ARM_CLIENT_ID)"
          -var="client_secret=$(ARM_CLIENT_SECRET)"
          -var="tenant_id=$(ARM_TENANT_ID)"
          -var="ssh_public_key=$(cat ~/.ssh/id_rsa.pub)"

    - script: |
        cd $(TF_WORKING_DIR)
        echo "##vso[task.setvariable variable=APP_PUBLIC_IP;isOutput=true]$(terraform output -raw app_public_ip)"
        echo "##vso[task.setvariable variable=MYSQL_FQDN;isOutput=true]$(terraform output -raw mysql_fqdn)"
        echo "App IP: $(terraform output -raw app_public_ip)"
        echo "MySQL FQDN: $(terraform output -raw mysql_fqdn)"
      displayName: 'Capture Terraform Outputs'
      name: tfoutputs
