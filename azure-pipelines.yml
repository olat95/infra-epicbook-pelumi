trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  TF_WORKING_DIR: '$(System.DefaultWorkingDirectory)'

stages:
- stage: Terraform
  displayName: 'Provision Infrastructure'
  jobs:
  - job: TerraformApply
    displayName: 'Terraform Init, Plan, Apply'
    steps:

    - task: DownloadSecureFile@1
      name: sshPublicKey
      displayName: 'Download SSH Public Key'
      inputs:
        secureFile: 'id_rsa_pub'

    - script: |
        mkdir -p ~/.ssh
        cp $(sshPublicKey.secureFilePath) ~/.ssh/id_rsa.pub
        chmod 644 ~/.ssh/id_rsa.pub
        echo "SSH public key staged"
      displayName: 'Stage SSH Public Key'

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    - script: |
        export ARM_CLIENT_ID=$(ARM_CLIENT_ID)
        export ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET)
        export ARM_TENANT_ID=$(ARM_TENANT_ID)
        export ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID)
        cd $(TF_WORKING_DIR)
        terraform init \
          -backend-config="resource_group_name=epicbook-tfstate-rg" \
          -backend-config="storage_account_name=epicbooktfstatepelz" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=epicbook.terraform.tfstate" \
          -backend-config="use_azuread_auth=true" \
          -backend-config="client_id=$(ARM_CLIENT_ID)" \
          -backend-config="client_secret=$(ARM_CLIENT_SECRET)" \
          -backend-config="tenant_id=$(ARM_TENANT_ID)" \
          -backend-config="subscription_id=$(ARM_SUBSCRIPTION_ID)"
      displayName: 'Terraform Init'

    - script: |
        export ARM_CLIENT_ID=$(ARM_CLIENT_ID)
        export ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET)
        export ARM_TENANT_ID=$(ARM_TENANT_ID)
        export ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID)
        cd $(TF_WORKING_DIR)
        terraform plan \
          -var="subscription_id=$(ARM_SUBSCRIPTION_ID)" \
          -var="client_id=$(ARM_CLIENT_ID)" \
          -var="client_secret=$(ARM_CLIENT_SECRET)" \
          -var="tenant_id=$(ARM_TENANT_ID)" \
          -var="ssh_public_key=$(cat ~/.ssh/id_rsa.pub)"
      displayName: 'Terraform Plan'

    - script: |
        export ARM_CLIENT_ID=$(ARM_CLIENT_ID)
        export ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET)
        export ARM_TENANT_ID=$(ARM_TENANT_ID)
        export ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID)
        cd $(TF_WORKING_DIR)
        terraform apply -auto-approve \
          -var="subscription_id=$(ARM_SUBSCRIPTION_ID)" \
          -var="client_id=$(ARM_CLIENT_ID)" \
          -var="client_secret=$(ARM_CLIENT_SECRET)" \
          -var="tenant_id=$(ARM_TENANT_ID)" \
          -var="ssh_public_key=$(cat ~/.ssh/id_rsa.pub)"
      displayName: 'Terraform Apply'

    - script: |
        cd $(TF_WORKING_DIR)
        echo "App Public IP: $(terraform output -raw app_public_ip)"
        echo "MySQL FQDN: $(terraform output -raw mysql_fqdn)"
        echo "##vso[task.setvariable variable=APP_PUBLIC_IP;isOutput=true]$(terraform output -raw app_public_ip)"
        echo "##vso[task.setvariable variable=MYSQL_FQDN;isOutput=true]$(terraform output -raw mysql_fqdn)"
      displayName: 'Capture Terraform Outputs'
      name: tfoutputs
